# H2 embedded database override for docker-compose.yml.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.h2.yml up
#
# This overrides the PostgreSQL defaults from docker-compose.yml with an
# embedded H2 file database, removes the external db service dependency,
# and uses an h2data volume for persistence.
#
# Why a separate file?  The base docker-compose.yml has
#   depends_on: db: condition: service_healthy
# which makes the app wait for the PostgreSQL container.  Docker Compose
# has no way to make that dependency conditional, so a single-file
# approach either fails in H2 mode (db not started) or wastes a
# container (db always started).  The override pattern cleanly removes
# the db service and its dependency via !reset, which cannot be done
# with environment variables alone.

services:
  app:
    environment:
      SPRING_PROFILES_ACTIVE: docker,h2
      DATABASE_URL: ""
      DATABASE_USERNAME: sa
      DATABASE_PASSWORD: ""
    depends_on: !reset []
    volumes:
      - h2data:/data

  db: !reset null

volumes:
  pgdata: !reset null
  h2data:
