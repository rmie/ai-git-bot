<svg xmlns="http://www.w3.org/2000/svg" width="680" height="400" viewBox="0 0 680 400" role="img">
  <title>AI-Git-Bot Architecture</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <linearGradient id="geminiGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#4285F4"/>
      <stop offset="33%"  stop-color="#EA4335"/>
      <stop offset="66%"  stop-color="#FBBC05"/>
      <stop offset="100%" stop-color="#34A853"/>
    </linearGradient>
  </defs>
  <rect width="680" height="400" fill="#000000"/>

  <!-- ===================== LEFT: AI providers ===================== -->
  <!-- Header at y=18, list starts y=36, ends y=182 → total height ~164, top=18
       To align vertically with center box (top=54, height=56 → center=82),
       we set the list top so its center matches 82 → list center = (18+182)/2 = 100
       Shift everything by -18 so center = 82: offset = 82-100 = -18 → start header at y=0...
       Instead: keep list as-is (center ~100), shift center box center to 100 too. -->

  <!-- AI providers header -->
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#ffffff" x="16" y="18">AI providers</text>

  <!-- Anthropic -->
  <circle cx="26" cy="36" r="8" fill="none" stroke="#4B9CD3" stroke-width="1.5"/>
  <path d="M22 36 Q26 30 30 36 Q26 42 22 36Z" fill="#4B9CD3" opacity="0.8"/>
  <text font-family="sans-serif" font-size="14" fill="#e0e0e0" x="40" y="40">Anthropic</text>

  <!-- Gemini -->
  <circle cx="26" cy="57" r="8" fill="none" stroke="#888" stroke-width="1.5"/>
  <path d="M26 50 Q32 57 26 64 Q20 57 26 50Z" fill="url(#geminiGrad)" opacity="0.9"/>
  <text font-family="sans-serif" font-size="14" fill="#e0e0e0" x="40" y="61">Gemini</text>

  <!-- OpenAI compatible -->
  <circle cx="26" cy="78" r="7" fill="none" stroke="#4B9CD3" stroke-width="1.5"/>
  <circle cx="26" cy="78" r="3" fill="#4B9CD3" opacity="0.7"/>
  <text font-family="sans-serif" font-size="14" fill="#e0e0e0" x="40" y="82">OpenAI compatible</text>

  <!-- Sub-list -->
  <line x1="40" y1="89" x2="40" y2="137" stroke="#444" stroke-width="1"/>
  <text font-family="sans-serif" font-size="12" fill="#aaa" x="52" y="99">ChatGPT</text>
  <text font-family="sans-serif" font-size="12" fill="#aaa" x="52" y="113">OpenRouter</text>
  <text font-family="sans-serif" font-size="12" fill="#aaa" x="52" y="127">LM Studio</text>
  <text font-family="sans-serif" font-size="12" fill="#aaa" x="52" y="141">vLLM</text>

  <!-- Ollama -->
  <circle cx="26" cy="157" r="7" fill="none" stroke="#4B9CD3" stroke-width="1.5"/>
  <path d="M23 154 Q26 150 29 154 L29 160 Q26 164 23 160Z" fill="#4B9CD3" opacity="0.6"/>
  <text font-family="sans-serif" font-size="14" fill="#e0e0e0" x="40" y="161">Ollama</text>

  <!-- llama.cpp -->
  <circle cx="26" cy="178" r="7" fill="none" stroke="#4B9CD3" stroke-width="1.5"/>
  <text font-family="sans-serif" font-size="9" font-weight="500" fill="#4B9CD3" x="21" y="182">Ll</text>
  <text font-family="sans-serif" font-size="14" fill="#e0e0e0" x="40" y="182">llama.cpp</text>

  <!-- Provider list vertical center: (36 + 182) / 2 = 109 → use 109 as common center -->

  <!-- Arrow providers -> center (at y=109) -->
  <line x1="190" y1="109" x2="238" y2="109" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===================== CENTER BOX (centered at y=109) ===================== -->
  <!-- top = 109 - 28 = 81, height=56 -->
  <rect x="240" y="81" width="198" height="56" rx="8" fill="#0c2a4a" stroke="#378ADD" stroke-width="0.8"/>
  <rect x="258" y="93" width="18" height="14" rx="3" fill="#185FA5" opacity="0.9"/>
  <rect x="261" y="90" width="4" height="4" rx="1" fill="#378ADD" opacity="0.7"/>
  <rect x="267" y="90" width="4" height="4" rx="1" fill="#378ADD" opacity="0.7"/>
  <circle cx="263" cy="99" r="2" fill="#B5D4F4" opacity="0.9"/>
  <circle cx="269" cy="99" r="2" fill="#B5D4F4" opacity="0.9"/>
  <rect x="262" y="103" width="10" height="2" rx="1" fill="#B5D4F4" opacity="0.7"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#B5D4F4" x="355" y="109" text-anchor="middle" dominant-baseline="central">AI-Git-Bot</text>

  <!-- Arrow center -> right (at y=109) -->
  <line x1="438" y1="109" x2="486" y2="109" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow center -> bottom boxes -->
  <line x1="339" y1="137" x2="339" y2="268" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===================== RIGHT: Git systems (header at y=18, list starts y=36) ===================== -->
  <!-- Git systems list: y=36 to y=104, center = (36+104)/2 = 70
       To align header top with left header (y=18): keep as-is.
       Git list is shorter; align its center to 109 → shift by +39 → starts at 75 -->

  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#ffffff" x="494" y="18">Git systems</text>

  <!-- GitHub (centered at y=75) -->
  <circle cx="504" cy="75" r="8" fill="#333" stroke="#666" stroke-width="0.5"/>
  <circle cx="504" cy="72" r="4" fill="white" opacity="0.9"/>
  <path d="M500 77 Q504 81 508 77" fill="none" stroke="white" stroke-width="1.2"/>
  <text font-family="sans-serif" font-size="14" fill="#e0e0e0" x="518" y="79">GitHub</text>

  <!-- GitLab -->
  <path d="M496 89 L512 89 L508 100 L504 97 L500 100Z" fill="#FC6D26"/>
  <text font-family="sans-serif" font-size="14" fill="#e0e0e0" x="518" y="99">GitLab</text>

  <!-- Gitea -->
  <rect x="497" y="109" width="14" height="11" rx="2" fill="#609926"/>
  <path d="M511 113 Q515 113 515 116 Q515 119 511 119" fill="none" stroke="#609926" stroke-width="1.5"/>
  <text font-family="sans-serif" font-size="14" fill="#e0e0e0" x="518" y="119">Gitea</text>

  <!-- Bitbucket -->
  <rect x="497" y="129" width="14" height="12" rx="2" fill="#0052CC"/>
  <path d="M501 132 L507 132 Q510 132 510 135 Q510 138 507 138 L501 138" fill="none" stroke="white" stroke-width="1.2"/>
  <text font-family="sans-serif" font-size="14" fill="#e0e0e0" x="518" y="139">Bitbucket</text>

  <!-- ===================== BOTTOM THREE BOXES ===================== -->

  <!-- Box 1: Review Pull Requests -->
  <rect x="16" y="270" width="202" height="52" rx="8" fill="#1e1535" stroke="#534AB7" stroke-width="0.8"/>
  <rect x="28" y="280" width="14" height="18" rx="2" fill="#534AB7" opacity="0.7"/>
  <rect x="31" y="278" width="8" height="4" rx="1" fill="#7F77DD" opacity="0.9"/>
  <line x1="31" y1="287" x2="39" y2="287" stroke="#CECBF6" stroke-width="1.2"/>
  <line x1="31" y1="291" x2="37" y2="291" stroke="#CECBF6" stroke-width="1.2"/>
  <path d="M31 295 L33 297 L37 292" fill="none" stroke="#CECBF6" stroke-width="1.3"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#CECBF6" x="122" y="292" text-anchor="middle" dominant-baseline="central">Review pull</text>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#CECBF6" x="122" y="308" text-anchor="middle" dominant-baseline="central">requests</text>

  <!-- Box 2: Generate Code from Issues -->
  <rect x="238" y="270" width="202" height="52" rx="8" fill="#0d2e27" stroke="#1D9E75" stroke-width="0.8"/>
  <text font-family="sans-serif" font-size="16" font-weight="500" fill="#1D9E75" x="248" y="302">&lt;/&gt;</text>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#9FE1CB" x="352" y="292" text-anchor="middle" dominant-baseline="central">Generate code</text>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#9FE1CB" x="352" y="308" text-anchor="middle" dominant-baseline="central">from issues</text>

  <!-- Box 3: Write and Improve Issues -->
  <rect x="460" y="270" width="202" height="52" rx="8" fill="#162210" stroke="#639922" stroke-width="0.8"/>
  <path d="M472 296 L480 288 L485 293 L477 301Z" fill="#639922" opacity="0.9"/>
  <path d="M470 298 L472 296 L474 302Z" fill="#639922" opacity="0.6"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#C0DD97" x="572" y="292" text-anchor="middle" dominant-baseline="central">Write and</text>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#C0DD97" x="572" y="308" text-anchor="middle" dominant-baseline="central">improve issues</text>
</svg>
