# H2 embedded database profile.
#
# Activate together with the docker profile to run without an external
# PostgreSQL container:
#   SPRING_PROFILES_ACTIVE=docker,h2
#
# The database file is stored at /data/giteabot — mount a volume
# at that path for persistence across container restarts.

spring.datasource.url=jdbc:h2:file:/data/giteabot;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
