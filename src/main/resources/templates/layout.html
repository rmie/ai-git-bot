<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title} + ' - AI Git Bot'">AI Git Bot</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="icon" type="image/svg+xml" th:href="@{/images/favicon.svg}"/>
    <script>
        (function() {
            const getStoredTheme = () => {
                try {
                    return localStorage.getItem('theme');
                } catch (e) {
                    return null;
                }
            };
            const getPreferredTheme = () => {
                const storedTheme = getStoredTheme();
                if (storedTheme) {
                    return storedTheme;
                }
                return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            };
            const setTheme = theme => {
                document.documentElement.setAttribute('data-bs-theme', theme);
            };
            setTheme(getPreferredTheme());
        })();
    </script>
</head>
<body>

<!-- Layout fragment -->
<div th:fragment="layout(title, content)">
    <div th:replace="~{layout :: head(${title})}"></div>

    <nav class="navbar navbar-expand-lg border-bottom shadow-sm mb-4" data-bs-theme="dark" style="background-color: #212529;">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" th:href="@{/dashboard}">
                <img th:src="@{/images/favicon.svg}" alt="AI Git Bot logo" width="28" height="28" class="me-2 brand-icon"/>
                AI Git Bot
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNav" aria-controls="navbarNav"
                    aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/dashboard}"
                           th:classappend="${activeNav == 'dashboard'} ? 'active'">
                            <i class="bi bi-speedometer2"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/bots}"
                           th:classappend="${activeNav == 'bots'} ? 'active'">
                            <i class="bi bi-cpu"></i> Bots
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/ai-integrations}"
                           th:classappend="${activeNav == 'ai-integrations'} ? 'active'">
                            <i class="bi bi-stars"></i> AI Integrations
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/git-integrations}"
                           th:classappend="${activeNav == 'git-integrations'} ? 'active'">
                            <i class="bi bi-git"></i> Git Integrations
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/system-settings}"
                           th:classappend="${activeNav == 'system-settings'} ? 'active'">
                            <i class="bi bi-gear"></i> System settings
                        </a>
                    </li>
                </ul>
                <ul class="navbar-nav align-items-center">
                    <li class="nav-item me-2">
                        <button class="btn btn-link nav-link px-2" id="bd-theme" type="button" aria-expanded="false" title="Toggle theme" aria-label="Toggle color theme">
                            <i class="bi bi-sun-fill" id="theme-icon"></i>
                        </button>
                    </li>
                    <li class="nav-item">
                        <form th:action="@{/logout}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-outline-light btn-sm">
                                <i class="bi bi-box-arrow-right"></i> Logout
                            </button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-4">
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle"></i> <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle"></i> <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div th:replace="${content}">
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        (function() {
            const themeToggle = document.getElementById('bd-theme');
            const themeIcon = document.getElementById('theme-icon');

            const getStoredTheme = () => {
                try {
                    return localStorage.getItem('theme');
                } catch (e) {
                    return null;
                }
            };

            const setStoredTheme = theme => {
                try {
                    localStorage.setItem('theme', theme);
                } catch (e) {}
            };

            const getPreferredTheme = () => {
                const storedTheme = getStoredTheme();
                if (storedTheme) {
                    return storedTheme;
                }
                return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            };

            const setTheme = theme => {
                document.documentElement.setAttribute('data-bs-theme', theme);
                updateThemeIcon(theme);
                if (themeToggle) {
                    themeToggle.setAttribute('aria-pressed', theme === 'dark');
                }
            };

            function updateThemeIcon(theme) {
                if (!themeIcon) return;
                if (theme === 'dark') {
                    themeIcon.classList.remove('bi-sun-fill');
                    themeIcon.classList.add('bi-moon-stars-fill');
                } else {
                    themeIcon.classList.remove('bi-moon-stars-fill');
                    themeIcon.classList.add('bi-sun-fill');
                }
            }

            if (themeToggle) {
                themeToggle.addEventListener('click', () => {
                    const currentTheme = document.documentElement.getAttribute('data-bs-theme');
                    const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                    setTheme(newTheme);
                    setStoredTheme(newTheme);
                });
            }

            // Listen for system theme changes
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
                const storedTheme = getStoredTheme();
                if (!storedTheme) {
                    setTheme(getPreferredTheme());
                }
            });

            // Initialize on load
            setTheme(getPreferredTheme());
        })();
    </script>
</div>

</body>
</html>
