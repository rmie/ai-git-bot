<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{layout :: layout('Workflow configuration', ~{::pageContent})}">
    <div th:fragment="pageContent">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>
                <i class="bi bi-diagram-3"></i>
                <span th:if="${workflowConfiguration.id == null}">New workflow configuration</span>
                <span th:if="${workflowConfiguration.id != null}">Edit workflow configuration</span>
            </h2>
            <a th:href="@{/system-settings}" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left"></i> Back to System settings
            </a>
        </div>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/system-settings/workflow-configurations/save}" method="post"
              th:object="${workflowConfiguration}">
            <input type="hidden" th:field="*{id}"/>
            <input type="hidden" th:field="*{defaultEntry}"/>

            <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" class="form-control" th:field="*{name}" required
                       th:readonly="${workflowConfiguration.defaultEntry}"/>
                <div class="form-text" th:if="${workflowConfiguration.defaultEntry}">
                    The default workflow configuration cannot be renamed.
                </div>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-save"></i> Save and select workflows
                </button>
                <a th:href="@{/system-settings}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>

    </div>
</div>
</body>
</html>
